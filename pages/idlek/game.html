<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>KrazyPlace — Idle K</title>

<link rel="stylesheet" href="https://unpkg.com/@picocss/pico@latest/css/pico.min.css">

<style>
body { display:flex; flex-direction:column; min-height:100vh; }
main { flex:1; }

.container-narrow {
  max-width:900px;
  margin:auto;
}

#gameArea, #preGame { display:none; }

button:disabled {
  opacity:0.4;
  cursor:not-allowed;
}
canvas {
  border:1px solid var(--surface-3);
  border-radius:50%;
}
</style>
</head>

<body>

<main class="container container-narrow">

<h1>Idle K</h1>

<!-- MENU -->
<div id="menu">
<button id="dailyBtn">Partie du jour</button>
<button id="randomBtn">Seed aléatoire</button>
</div>

<!-- PRE GAME -->
<div id="preGame">
<h2>Briefing</h2>

<h3>Objectifs</h3>
<ul>
<li>Nord : <span id="goalNorth"></span></li>
<li>Sud : <span id="goalSouth"></span></li>
<li>Est : <span id="goalEast"></span></li>
<li>Ouest : <span id="goalWest"></span></li>
</ul>

<h3>Missions</h3>
<table>
<tbody id="missionsPreview"></tbody>
</table>

<button id="startBtn">Start Game</button>
</div>

<!-- GAME -->
<div id="gameArea">

<p>Temps : <span id="timer">0</span>s</p>

<table>
<tr>
<td>Nord: <span id="totalNorth">0</span></td>
<td>Sud: <span id="totalSouth">0</span></td>
<td>Est: <span id="totalEast">0</span></td>
<td>Ouest: <span id="totalWest">0</span></td>
</tr>
</table>

<canvas id="controlCanvas" width="300" height="300"></canvas>

<p>
Nord : <span id="northRate"></span> |
Sud : <span id="southRate"></span> |
Est : <span id="eastRate"></span> |
Ouest : <span id="westRate"></span>
</p>

<h3>Missions</h3>
<table>
<tbody id="missionsBody"></tbody>
</table>

<div id="endBox" style="display:none;">
<h2>Fin</h2>
<p>Temps : <span id="finalTime"></span></p>
<p>Runes gaspillées : <span id="wastedRunes"></span></p>
</div>

</div>

</main>

<script>
// -------- RNG ----------
function pseudoRandom(seed){
  let s = seed;
  return () => {
    s = (s * 16807) % 2147483647;
    return (s - 1) / 2147483646;
  };
}

let rng;
let goals = {};
let totals = {};
let missions = [];
let globalMultiplier = 1;

let running = false;
let startTime;
let lastUpdate = 0;

let x=0,y=0,pointLocked=true;

// -------- CANVAS ----------
const canvas = document.getElementById("controlCanvas");
const ctx = canvas.getContext("2d");
const radius = canvas.width/2;
const center = {x:radius,y:radius};

const directions = [
  { name:"Nord", x:0, y:1 },
  { name:"Nord-Est", x:0.707, y:0.707 },
  { name:"Est", x:1, y:0 },
  { name:"Sud-Est", x:0.707, y:-0.707 },
  { name:"Sud", x:0, y:-1 },
  { name:"Sud-Ouest", x:-0.707, y:-0.707 },
  { name:"Ouest", x:-1, y:0 },
  { name:"Nord-Ouest", x:-0.707, y:0.707 }
];

// -------- SETUP ONLY ----------
function setupGame(seed){
  rng = pseudoRandom(seed);

  const totalGoal = 1200 + Math.floor(rng()*401);
  let parts = [rng(),rng(),rng(),rng()];
  let sum = parts.reduce((a,b)=>a+b,0);

  goals.north = Math.floor(parts[0]/sum*totalGoal);
  goals.south = Math.floor(parts[1]/sum*totalGoal);
  goals.east  = Math.floor(parts[2]/sum*totalGoal);
  goals.west  = totalGoal - goals.north - goals.south - goals.east;

  generateMissions();

  // preview
  document.getElementById("goalNorth").textContent = goals.north;
  document.getElementById("goalSouth").textContent = goals.south;
  document.getElementById("goalEast").textContent  = goals.east;
  document.getElementById("goalWest").textContent  = goals.west;

  renderPreview();

  document.getElementById("menu").style.display="none";
  document.getElementById("preGame").style.display="block";
}

// -------- START GAME ----------
function startGame(){
  totals = {north:0,south:0,east:0,west:0};
  globalMultiplier = 1;

  document.getElementById("preGame").style.display="none";
  document.getElementById("gameArea").style.display="block";

  renderMissions();

  startTime = performance.now();
  lastUpdate = performance.now();
  running = true;

  gameLoop();
}

// -------- MISSIONS ----------
function generateMissions(){
  missions=[];
  let pool=[...directions];

  for(let i=0;i<3;i++){
    const index=Math.floor(rng()*pool.length);
    const dir=pool.splice(index,1)[0];

    missions.push({
      direction:dir,
      progress:0,
      completed:false,
      boosted:false
    });
  }
}

function renderPreview(){
  const body=document.getElementById("missionsPreview");
  body.innerHTML="";
  missions.forEach(m=>{
    body.innerHTML += `<tr><td>${m.direction.name}</td><td>Orientation requise</td></tr>`;
  });
}

function renderMissions(){
  const body=document.getElementById("missionsBody");
  body.innerHTML="";

  missions.forEach((m,i)=>{
    body.innerHTML+=`
    <tr>
      <td>${m.direction.name}</td>
      <td>
        <progress id="mission${i}" value="0" max="100"></progress>
      </td>
      <td>
        <button id="boost${i}" disabled>
          50 runes de chaque
        </button>
      </td>
    </tr>`;
  });
}

// -------- BOOST ----------
function updateButtons(){
  missions.forEach((m,i)=>{
    const btn=document.getElementById("boost"+i);
    if(!btn) return;

    if(m.boosted){
      btn.textContent="Acheté";
      btn.disabled=true;
      return;
    }

    const canBuy =
      totals.north>=50 &&
      totals.south>=50 &&
      totals.east>=50 &&
      totals.west>=50;

    btn.disabled = !(canBuy && m.completed);

    btn.onclick=()=>{
      if(!canBuy || !m.completed) return;

      totals.north-=50;
      totals.south-=50;
      totals.east-=50;
      totals.west-=50;

      globalMultiplier*=2;

      m.boosted=true;
      btn.textContent="Acheté";
      btn.disabled=true;
    };
  });
}

// -------- LOOP ----------
function gameLoop(){
  if(!running) return;

  const now=performance.now();
  const delta=(now-lastUpdate)/1000;
  lastUpdate=now;

  let north=1+y;
  let south=1-y;
  let east=1+x;
  let west=1-x;

  totals.north += north*globalMultiplier*delta;
  totals.south += south*globalMultiplier*delta;
  totals.east  += east *globalMultiplier*delta;
  totals.west  += west *globalMultiplier*delta;

  updateUI(north,south,east,west);
  updateMissions();
  updateButtons();

  const elapsed=(now-startTime)/1000;
  document.getElementById("timer").textContent=elapsed.toFixed(1);

  if(
    totals.north>=goals.north &&
    totals.south>=goals.south &&
    totals.east>=goals.east &&
    totals.west>=goals.west
  ){
    running=false;

    document.getElementById("finalTime").textContent=elapsed.toFixed(2);

    const wasted =
      Math.max(0,totals.north-goals.north)+
      Math.max(0,totals.south-goals.south)+
      Math.max(0,totals.east-goals.east)+
      Math.max(0,totals.west-goals.west);

    document.getElementById("wastedRunes").textContent=Math.floor(wasted);
    document.getElementById("endBox").style.display="block";
    return;
  }

  draw();
  requestAnimationFrame(gameLoop);
}

// -------- MISSIONS UPDATE ----------
function updateMissions(){
  missions.forEach((m,i)=>{
    if(m.completed) return;

    const dot=(x*m.direction.x + y*m.direction.y);
    const factor=Math.max(0,dot);

    m.progress += factor*0.1;

    if(m.progress>=100){
      m.progress=100;
      m.completed=true;
    }

    document.getElementById("mission"+i).value=m.progress;
  });
}

// -------- UI ----------
function updateUI(n,s,e,w){
  document.getElementById("totalNorth").textContent=Math.floor(totals.north);
  document.getElementById("totalSouth").textContent=Math.floor(totals.south);
  document.getElementById("totalEast").textContent=Math.floor(totals.east);
  document.getElementById("totalWest").textContent=Math.floor(totals.west);

  document.getElementById("northRate").textContent=(n*globalMultiplier).toFixed(2);
  document.getElementById("southRate").textContent=(s*globalMultiplier).toFixed(2);
  document.getElementById("eastRate").textContent=(e*globalMultiplier).toFixed(2);
  document.getElementById("westRate").textContent=(w*globalMultiplier).toFixed(2);
}

// -------- CANVAS ----------
function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  ctx.beginPath();
  ctx.arc(center.x,center.y,radius-5,0,Math.PI*2);
  ctx.stroke();

  const px=center.x + x*(radius-5);
  const py=center.y - y*(radius-5);

  ctx.beginPath();
  ctx.arc(px,py,6,0,Math.PI*2);
  ctx.fill();
}

canvas.addEventListener("click",(e)=>{
  if(!running) return;

  const rect=canvas
