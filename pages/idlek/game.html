<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>KrazyPlace — Idle K</title>
<link rel="stylesheet" href="https://unpkg.com/@picocss/pico@latest/css/pico.min.css">

<style>
html, body {
  height: 100%;
  margin: 0;
  display: flex;
  flex-direction: column;
}
main {flex: 1;}
#gameArea {
  font-size: 0.9rem;
  line-height: 1;
}
.hero { padding: 0.5rem; text-align: center; }
.logo a { color: lightblue; }
.container-narrow {
  max-width: 900px;
  margin-left: auto;
  margin-right: auto;
}
table { width: 100%; text-align: center; }
td, th { padding: 0.5rem; }
footer {
  margin-top: 1rem;
  text-align: center;
  border-top: 1px solid var(--surface-3);
  padding-top: 1rem;
}
progress { width: 100%; }

#startSection {
  margin: 1rem 0;
}
</style>
</head>
<body>

<header class="container container-narrow">
<nav>
<ul>
<li class="logo"><a href="/krazyplace">KrazyPlace</a></li>
<li><a href="#">Idle K</a></li>
</ul>
</nav>
</header>

<main class="container container-narrow">
<section class="hero">

<h1>Idle K</h1>

<div style="margin:1rem 0;">
<button id="dailyBtn">Partie du jour 🌞</button>
<button id="randomBtn">Seed aléatoire 🎲</button>
</div>

<div id="gameArea" style="display:none;">

<h3>Objectifs quotidiens</h3>

<table>
<thead>
<tr>
<th>Rune</th>
<th>Objectif</th>
<th>Actuel</th>
</tr>
</thead>
<tbody>
<tr><td>Nord</td><td id="goalNorth"></td><td id="totalNorth">0</td></tr>
<tr><td>Sud</td><td id="goalSouth"></td><td id="totalSouth">0</td></tr>
<tr><td>Est</td><td id="goalEast"></td><td id="totalEast">0</td></tr>
<tr><td>Ouest</td><td id="goalWest"></td><td id="totalWest">0</td></tr>
</tbody>
</table>

<p>Temps écoulé : <strong id="timer">0.0</strong>s</p>

<div id="startSection">
<button id="startBtn">▶ Lancer la partie</button>
</div>

<div id="controlsSection">
<canvas id="controlCanvas" width="300" height="300"
style="margin-top:1rem;border:1px solid var(--surface-3);border-radius:50%;"></canvas>

<div style="margin-top:1rem;">
Nord : <span id="northRate"></span> /s |
Sud : <span id="southRate"></span> /s |
Est : <span id="eastRate"></span> /s |
Ouest : <span id="westRate"></span> /s
</div>
</div>

<div id="missionsSection">
<h3 style="margin-top:1.5rem;">Missions</h3>

<table>
<thead>
<tr>
<th>Mission</th>
<th>Progression</th>
<th>Action</th>
</tr>
</thead>
<tbody id="missionsBody"></tbody>
</table>
</div>

<div id="endBox" style="display:none;margin-top:1.5rem;">
<h2>🏁 Objectifs atteints</h2>
<p>Temps final : <strong id="finalTime"></strong>s</p>
<p>Runes gaspillées : <strong id="wastedRunes">0</strong></p>
</div>

</div>
</section>
</main>

<footer><p>© KrazyPlace</p></footer>

<script>
function pseudoRandom(seed){
  let s = seed;
  return () => {
    s = (s * 16807) % 2147483647;
    return (s - 1) / 2147483646;
  };
}

let rng;
let goals = {};
let totals = { north:0, south:0, east:0, west:0 };
let missions = [];
let globalMultiplier = 1;

let startTime;
let running = false;
let pointLocked = false;

let x = 0;
let y = 0;

const canvas = document.getElementById("controlCanvas");
const ctx = canvas.getContext("2d");
const radius = canvas.width / 2;
const center = { x: radius, y: radius };

function startGame(seed){
  rng = pseudoRandom(seed);

  const totalGoal = 1200 + Math.floor(rng()*401);
  let parts = [rng(), rng(), rng(), rng()];
  let sum = parts.reduce((a,b)=>a+b,0);

  goals.north = Math.floor((parts[0]/sum)*totalGoal);
  goals.south = Math.floor((parts[1]/sum)*totalGoal);
  goals.east  = Math.floor((parts[2]/sum)*totalGoal);
  goals.west  = totalGoal - goals.north - goals.south - goals.east;

  totals = { north:0, south:0, east:0, west:0 };
  globalMultiplier = 1;

  document.getElementById("goalNorth").textContent = goals.north;
  document.getElementById("goalSouth").textContent = goals.south;
  document.getElementById("goalEast").textContent  = goals.east;
  document.getElementById("goalWest").textContent  = goals.west;

  generateMissions();

  document.getElementById("gameArea").style.display = "block";
  document.getElementById("startSection").style.display = "block";

  running = false;
}

function launchRun(){
  startTime = performance.now();
  lastUpdate = performance.now();
  running = true;

  document.getElementById("startSection").style.display = "none";

  if(!window.gameInterval) {
    window.gameInterval = setInterval(gameLoop, 50);
  }
}

document.getElementById("startBtn").onclick = launchRun;

function generateMissions(){
  missions = [];
  const body = document.getElementById("missionsBody");
  body.innerHTML = "";

  const directions = [
    { name:"Nord", x:0, y:1 },
    { name:"Est", x:1, y:0 },
    { name:"Sud", x:0, y:-1 }
  ];

  directions.forEach((dir,i)=>{
    const mission = {
      direction: dir,
      progress: 0,
      completed: false,
      boosted: false
    };

    missions.push(mission);

    const row = document.createElement("tr");
    row.innerHTML = `
      <td>${dir.name}</td>
      <td>
        <progress id="mission${i}" value="0" max="100"></progress>
        <span id="missionLabel${i}">0%</span>
      </td>
      <td>
        <button id="boost${i}" disabled>
          x2 production
        </button>
      </td>
    `;
    body.appendChild(row);

    document.getElementById("boost"+i).onclick = ()=>tryBoost(i);
  });
}

function tryBoost(i){
  const m = missions[i];

  if(m.boosted) return;

  if(
    totals.north >= 50 &&
    totals.south >= 50 &&
    totals.east  >= 50 &&
    totals.west  >= 50
  ){
    // paiement
    totals.north -= 50;
    totals.south -= 50;
    totals.east  -= 50;
    totals.west  -= 50;

    // boost
    globalMultiplier *= 2;
    m.boosted = true;

    // UI fix immédiat
    updateTotals();
    updateRates(1+y,1-y,1+x,1-x);

    const btn = document.getElementById("boost"+i);
    btn.disabled = true;
    btn.textContent = "✔ Activé";
  }
}

function updateMissions(){
  if(!running) return;

  missions.forEach((m,i)=>{
    if(m.completed) return;

    const dot = (x*m.direction.x + y*m.direction.y);
    const factor = Math.max(0, dot);

    m.progress += factor * 0.1;

    if(m.progress >= 100){
      m.progress = 100;
      m.completed = true;
      document.getElementById("boost"+i).disabled = false;
    }

    document.getElementById("mission"+i).value = m.progress;
    document.getElementById("missionLabel"+i).textContent =
      Math.floor(m.progress)+"%";
  });
}

let lastUpdate = 0;

function gameLoop(){
  if(!running) return;

  const now = performance.now();
  const delta = (now - lastUpdate)/1000;
  lastUpdate = now;

  let north = 1 + y;
  let south = 1 - y;
  let east  = 1 + x;
  let west  = 1 - x;

  totals.north += (north*globalMultiplier)*delta;
  totals.south += (south*globalMultiplier)*delta;
  totals.east  += (east*globalMultiplier)*delta;
  totals.west  += (west*globalMultiplier)*delta;

  updateTotals();
  updateRates(north,south,east,west);
  updateMissions();
}

function updateTotals(){
  document.getElementById("totalNorth").textContent = Math.floor(totals.north);
  document.getElementById("totalSouth").textContent = Math.floor(totals.south);
  document.getElementById("totalEast").textContent  = Math.floor(totals.east);
  document.getElementById("totalWest").textContent  = Math.floor(totals.west);
}

function updateRates(n,s,e,w){
  document.getElementById("northRate").textContent = (n*globalMultiplier).toFixed(2);
  document.getElementById("southRate").textContent = (s*globalMultiplier).toFixed(2);
  document.getElementById("eastRate").textContent  = (e*globalMultiplier).toFixed(2);
  document.getElementById("westRate").textContent  = (w*globalMultiplier).toFixed(2);
}

document.getElementById("dailyBtn").onclick=()=>{
  const seed = Date.now();
  startGame(seed);
};

document.getElementById("randomBtn").onclick=()=>{
  const seed = Math.floor(Math.random()*2147483647);
  startGame(seed);
};
</script>
</body>
</html>
