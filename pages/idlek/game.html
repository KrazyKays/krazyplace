<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>KrazyPlace — Idle K</title>
<link rel="stylesheet" href="https://unpkg.com/@picocss/pico@latest/css/pico.min.css">

<style>
html, body {
  height: 100%;
  margin: 0;
  display: flex;
  flex-direction: column;
}
main {flex: 1;}
#gameArea { font-size: 0.9rem; line-height: 1; }
.hero { padding: 0.5rem; text-align: center; }
.logo a { color: lightblue; }
.container-narrow {
  max-width: 900px;
  margin-left: auto;
  margin-right: auto;
}
table { width: 100%; text-align: center; }
td, th { padding: 0.5rem; }
footer {
  margin-top: 1rem;
  text-align: center;
  border-top: 1px solid var(--surface-3);
  padding-top: 1rem;
}
progress { width: 100%; }
.disabled-btn {
  opacity: 0.5;
}
</style>
</head>
<body>

<header class="container container-narrow">
<nav>
<ul>
<li class="logo"><a href="/krazyplace">KrazyPlace</a></li>
<li><a href="#">Idle K</a></li>
</ul>
</nav>
</header>

<main class="container container-narrow">
<section class="hero">

<h1>Idle K</h1>

<div style="margin:1rem 0;">
<button id="dailyBtn">Partie du jour 🌞</button>
<button id="randomBtn">Seed aléatoire 🎲</button>
</div>

<!-- PREVIEW -->
<div id="previewArea" style="display:none;">
<h3>Objectifs de la partie</h3>

<table>
<tr><td>Nord</td><td id="pGoalNorth"></td></tr>
<tr><td>Sud</td><td id="pGoalSouth"></td></tr>
<tr><td>Est</td><td id="pGoalEast"></td></tr>
<tr><td>Ouest</td><td id="pGoalWest"></td></tr>
</table>

<h3>Missions</h3>
<ul id="previewMissions"></ul>

<button id="startBtn">▶️ Lancer la partie</button>
</div>

<!-- GAME -->
<div id="gameArea" style="display:none;">

<h3>Objectifs</h3>
<table>
<tr><td>Nord</td><td id="goalNorth"></td><td id="totalNorth">0</td></tr>
<tr><td>Sud</td><td id="goalSouth"></td><td id="totalSouth">0</td></tr>
<tr><td>Est</td><td id="goalEast"></td><td id="totalEast">0</td></tr>
<tr><td>Ouest</td><td id="goalWest"></td><td id="totalWest">0</td></tr>
</table>

<p>Temps : <strong id="timer">0.0</strong>s</p>

<canvas id="controlCanvas" width="300" height="300"
style="margin-top:1rem;border:1px solid var(--surface-3);border-radius:50%;"></canvas>

<div style="margin-top:1rem;">
Nord : <span id="northRate"></span> |
Sud : <span id="southRate"></span> |
Est : <span id="eastRate"></span> |
Ouest : <span id="westRate"></span>
</div>

<h3>Missions</h3>
<table>
<tbody id="missionsBody"></tbody>
</table>

<div id="endBox" style="display:none;">
<h2>🏁 Terminé</h2>
<p>Temps : <strong id="finalTime"></strong></p>
</div>

</div>
</section>
</main>

<footer><p>© KrazyPlace</p></footer>

<script>
function pseudoRandom(seed){
  let s = seed;
  return () => {
    s = (s * 16807) % 2147483647;
    return (s - 1) / 2147483646;
  };
}

let rng, goals={}, totals, missions=[];
let globalMultiplier=1;
let running=false;
let startTime;

const directions = [
  { name:"Nord", x:0, y:1 },
  { name:"Est", x:1, y:0 },
  { name:"Sud", x:0, y:-1 },
  { name:"Ouest", x:-1, y:0 }
];

let selectedSeed;

/* ================= PREVIEW ================= */

function prepareGame(seed){
  selectedSeed = seed;
  rng = pseudoRandom(seed);

  const totalGoal = 1200 + Math.floor(rng()*400);
  let parts = [rng(),rng(),rng(),rng()];
  let sum = parts.reduce((a,b)=>a+b,0);

  goals = {
    north: Math.floor(parts[0]/sum*totalGoal),
    south: Math.floor(parts[1]/sum*totalGoal),
    east:  Math.floor(parts[2]/sum*totalGoal),
  };
  goals.west = totalGoal - goals.north - goals.south - goals.east;

  document.getElementById("pGoalNorth").textContent = goals.north;
  document.getElementById("pGoalSouth").textContent = goals.south;
  document.getElementById("pGoalEast").textContent = goals.east;
  document.getElementById("pGoalWest").textContent = goals.west;

  const list = document.getElementById("previewMissions");
  list.innerHTML = "";

  missions = [];

  for(let i=0;i<3;i++){
    const dir = directions[i];
    missions.push({direction:dir,progress:0,completed:false,boosted:false});
    const li = document.createElement("li");
    li.textContent = dir.name;
    list.appendChild(li);
  }

  document.getElementById("previewArea").style.display="block";
}

/* ================= GAME ================= */

function startGame(){
  totals = {north:0,south:0,east:0,west:0};
  globalMultiplier = 1;

  document.getElementById("previewArea").style.display="none";
  document.getElementById("gameArea").style.display="block";

  document.getElementById("goalNorth").textContent = goals.north;
  document.getElementById("goalSouth").textContent = goals.south;
  document.getElementById("goalEast").textContent = goals.east;
  document.getElementById("goalWest").textContent = goals.west;

  generateMissionsUI();

  startTime = performance.now();
  running = true;
  setInterval(loop,100);
}

function generateMissionsUI(){
  const body = document.getElementById("missionsBody");
  body.innerHTML="";

  missions.forEach((m,i)=>{
    const row = document.createElement("tr");
    row.innerHTML = `
      <td>${m.direction.name}</td>
      <td><progress id="prog${i}" max="100"></progress></td>
      <td><button id="btn${i}">Pas assez de runes</button></td>
    `;
    body.appendChild(row);

    document.getElementById("btn"+i).onclick=()=>buyBoost(i);
  });
}

function buyBoost(i){
  const m = missions[i];
  if(m.boosted) return;

  if(canAfford()){
    spend();
    globalMultiplier*=2;
    m.boosted=true;
  }
}

function canAfford(){
  return totals.north>=50 && totals.south>=50 &&
         totals.east>=50 && totals.west>=50;
}

function spend(){
  totals.north-=50;
  totals.south-=50;
  totals.east-=50;
  totals.west-=50;
}

function updateButtons(){
  missions.forEach((m,i)=>{
    const btn = document.getElementById("btn"+i);

    if(m.boosted){
      btn.textContent="Acheté";
      btn.disabled=true;
    } else if(canAfford()){
      btn.textContent="Acheter boost";
      btn.disabled=false;
    } else {
      btn.textContent="Pas assez de runes";
      btn.disabled=true;
    }
  });
}

function loop(){
  if(!running) return;

  totals.north+=1;
  totals.south+=1;
  totals.east+=1;
  totals.west+=1;

  updateButtons();

  document.getElementById("totalNorth").textContent=Math.floor(totals.north);
  document.getElementById("totalSouth").textContent=Math.floor(totals.south);
  document.getElementById("totalEast").textContent=Math.floor(totals.east);
  document.getElementById("totalWest").textContent=Math.floor(totals.west);

  const t=(performance.now()-startTime)/1000;
  document.getElementById("timer").textContent=t.toFixed(1);
}

/* ================= EVENTS ================= */

document.getElementById("dailyBtn").onclick=()=>{
  const seed = Date.now();
  prepareGame(seed);
};

document.getElementById("randomBtn").onclick=()=>{
  prepareGame(Math.random()*999999);
};

document.getElementById("startBtn").onclick=startGame;

</script>
</body>
</html>
