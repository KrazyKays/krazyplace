<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Idle K</title>

<link rel="stylesheet" href="https://unpkg.com/@picocss/pico@latest/css/pico.min.css">

<style>
body { display:flex; flex-direction:column; min-height:100vh; }
main { flex:1; }

.container-narrow {
  max-width:900px;
  margin:auto;
}

#gameArea, #preGame {
  display:none;
}

button:disabled {
  opacity:0.4;
  cursor:not-allowed;
}
</style>
</head>

<body>

<main class="container container-narrow">

<h1>Idle K</h1>

<!-- MENU -->
<div id="menu">
<button id="dailyBtn">Partie du jour</button>
<button id="randomBtn">Seed aléatoire</button>
</div>

<!-- PRE GAME -->
<div id="preGame">
<h2>Briefing</h2>

<h3>Objectifs</h3>
<ul>
<li>Nord : <span id="goalNorth"></span></li>
<li>Sud : <span id="goalSouth"></span></li>
<li>Est : <span id="goalEast"></span></li>
<li>Ouest : <span id="goalWest"></span></li>
</ul>

<h3>Missions</h3>
<table>
<tbody id="missionsPreview"></tbody>
</table>

<button id="startBtn">Start Game</button>
</div>

<!-- GAME -->
<div id="gameArea">

<p>Temps : <span id="timer">0</span>s</p>

<p>
Nord: <span id="totalNorth">0</span> |
Sud: <span id="totalSouth">0</span> |
Est: <span id="totalEast">0</span> |
Ouest: <span id="totalWest">0</span>
</p>

<table>
<tbody id="missionsBody"></tbody>
</table>

</div>

</main>

<script>
function pseudoRandom(seed){
  let s = seed;
  return () => {
    s = (s * 16807) % 2147483647;
    return (s - 1) / 2147483646;
  };
}

let rng;
let goals = {};
let totals;
let missions = [];
let running = false;
let startTime;

// -------- INIT GAME (SANS LANCER) ----------
function setupGame(seed){
  rng = pseudoRandom(seed);

  const totalGoal = 1200 + Math.floor(rng()*400);
  let parts = [rng(),rng(),rng(),rng()];
  let sum = parts.reduce((a,b)=>a+b,0);

  goals = {
    north: Math.floor(parts[0]/sum*totalGoal),
    south: Math.floor(parts[1]/sum*totalGoal),
    east:  Math.floor(parts[2]/sum*totalGoal)
  };
  goals.west = totalGoal - goals.north - goals.south - goals.east;

  document.getElementById("goalNorth").textContent = goals.north;
  document.getElementById("goalSouth").textContent = goals.south;
  document.getElementById("goalEast").textContent  = goals.east;
  document.getElementById("goalWest").textContent  = goals.west;

  generateMissionsPreview();

  document.getElementById("menu").style.display="none";
  document.getElementById("preGame").style.display="block";
}

// -------- START GAME ----------
function startGame(){
  totals = { north:0,south:0,east:0,west:0 };

  document.getElementById("preGame").style.display="none";
  document.getElementById("gameArea").style.display="block";

  renderMissions();

  startTime = performance.now();
  running = true;

  loop();
}

// -------- MISSIONS ----------
function generateMissionsPreview(){
  missions = [];
  const body = document.getElementById("missionsPreview");
  body.innerHTML="";

  const dirs = ["Nord","Sud","Est","Ouest"];

  dirs.slice(0,3).forEach(d=>{
    missions.push({
      name:d,
      progress:0,
      completed:false,
      boosted:false
    });

    body.innerHTML += `<tr><td>${d}</td><td>Atteindre 100%</td></tr>`;
  });
}

function renderMissions(){
  const body = document.getElementById("missionsBody");
  body.innerHTML="";

  missions.forEach((m,i)=>{
    body.innerHTML += `
    <tr>
      <td>${m.name}</td>
      <td><span id="prog${i}">0%</span></td>
      <td>
        <button id="boost${i}" disabled>
          Acheter boost (50 runes)
        </button>
      </td>
    </tr>`;
  });
}

// -------- LOGIQUE BOUTON ----------
function updateButtons(){
  missions.forEach((m,i)=>{
    const btn = document.getElementById("boost"+i);
    if(!btn) return;

    if(m.boosted){
      btn.textContent = "Acheté";
      btn.disabled = true;
      return;
    }

    const canBuy =
      totals.north>=50 &&
      totals.south>=50 &&
      totals.east>=50 &&
      totals.west>=50;

    btn.disabled = !canBuy;

    btn.onclick = ()=>{
      if(!canBuy) return;

      totals.north-=50;
      totals.south-=50;
      totals.east-=50;
      totals.west-=50;

      m.boosted = true;
      btn.textContent="Acheté";
      btn.disabled=true;
    };
  });
}

// -------- LOOP ----------
function loop(){
  if(!running) return;

  let delta = 0.05;

  totals.north += delta;
  totals.south += delta;
  totals.east  += delta;
  totals.west  += delta;

  document.getElementById("totalNorth").textContent = Math.floor(totals.north);
  document.getElementById("totalSouth").textContent = Math.floor(totals.south);
  document.getElementById("totalEast").textContent  = Math.floor(totals.east);
  document.getElementById("totalWest").textContent  = Math.floor(totals.west);

  missions.forEach((m,i)=>{
    if(!m.completed){
      m.progress += 0.5;
      if(m.progress>=100){
        m.progress=100;
        m.completed=true;
      }
      document.getElementById("prog"+i).textContent = Math.floor(m.progress)+"%";
    }
  });

  updateButtons();

  const t = (performance.now()-startTime)/1000;
  document.getElementById("timer").textContent = t.toFixed(1);

  requestAnimationFrame(loop);
}

// -------- EVENTS ----------
document.getElementById("dailyBtn").onclick=()=>{
  const seed = Date.now();
  setupGame(seed);
};

document.getElementById("randomBtn").onclick=()=>{
  setupGame(Math.random()*999999);
};

document.getElementById("startBtn").onclick=startGame;

</script>

</body>
</html>
