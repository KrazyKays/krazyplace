<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>KrazyPlace — Idle K</title>
  <link rel="stylesheet" href="https://unpkg.com/@picocss/pico@latest/css/pico.min.css">
  <style>
    html, body {
      height: 100%;
      margin: 0;
      display: flex;
      flex-direction: column;
    }
    
    main {
      flex: 1;
    }
    .hero {
      padding: 0.5rem 0.5rem;
      text-align: center;
    }
    .logo a {
      color: lightblue;
    }
    .container-narrow {
      max-width: 900px;
      margin-left: auto;
      margin-right: auto;
    }
    .daily-box {
      background: var(--surface-2);
      border-radius: var(--border-radius);
      padding: 1.5rem;
      margin-top: 1rem;
    }
    #studyBtn {
      margin-bottom: 0.5rem;
    }
    table {
      width: 100%;
      text-align: center;
    }
    td, th {
      padding: 0.5rem;
    }
    .actions button {
      margin: 0.2rem;
    }
    footer {
      margin-top: 1rem;
      text-align: center;
      border-top: 1px solid var(--surface-3);
      padding-top: 1rem;
    }
    #chartContainer {
      margin-top: 2rem;
      background: var(--surface-2);
      border-radius: var(--border-radius);
      padding: 1rem;
    }
  </style>
</head>
<body>
  <header class="container container-narrow">
    <nav>
      <ul>
        <li class="logo"><a href="/krazyplace">KrazyPlace</a></li>
        <li><a href="#">Idle K</a></li>
      </ul>
    </nav>
  </header>
  
  <main class="container container-narrow">
    <section class="hero">
      <h1>Idle Runes — Daily Speedrun</h1>
      <p>Choisis un point dans le cercle pour optimiser ta génération.</p>

      <div style="margin:1rem 0;">
        <button id="dailyBtn">Partie du jour 🌞</button>
        <button id="randomBtn">Seed aléatoire 🎲</button>
      </div>

      <div id="gameArea" style="display:none;">

        <h3>Objectif quotidien : <span id="goal"></span> runes</h3>
        <p>Temps écoulé : <strong id="timer">0.0</strong>s</p>
        <p>Total runes : <strong id="totalRunes">0</strong></p>

        <canvas id="controlCanvas" width="300" height="300"
          style="margin-top:1rem;border:1px solid var(--surface-3);border-radius:50%;">
        </canvas>

        <div style="margin-top:1rem;">
          Nord : <span id="northRate"></span> /s |
          Sud : <span id="southRate"></span> /s |
          Est : <span id="eastRate"></span> /s |
          Ouest : <span id="westRate"></span> /s
        </div>

        <div id="endBox" style="display:none;margin-top:1.5rem;">
          <h2>🏁 Objectif atteint</h2>
          <p>Temps final : <strong id="finalTime"></strong>s</p>
        </div>

      </div>
    </section>
  </main>

  <footer><p>© KrazyPlace</p></footer>

  <script>
/* ===========================
   RANDOM DÉTERMINISTE
=========================== */
function pseudoRandom(seed) {
  let s = seed;
  return () => {
    s = (s * 16807) % 2147483647;
    return (s - 1) / 2147483646;
  };
}

let rng;
let goal = 0;
let totalRunes = 0;
let startTime;
let running = false;

let x = 0;
let y = 0;

const canvas = document.getElementById("controlCanvas");
const ctx = canvas.getContext("2d");
const radius = canvas.width / 2;
const center = { x: radius, y: radius };

/* ===========================
   INITIALISATION
=========================== */

function startGame(seed) {
  rng = pseudoRandom(seed);

  goal = 5000 + Math.floor(rng() * 5000);
  document.getElementById("goal").textContent = goal;

  totalRunes = 0;
  document.getElementById("totalRunes").textContent = 0;
  document.getElementById("timer").textContent = "0.0";

  document.getElementById("endBox").style.display = "none";
  document.getElementById("gameArea").style.display = "block";

  x = 0;
  y = 0;

  startTime = performance.now();
  running = true;

  requestAnimationFrame(loop);
  draw();
}

/* ===========================
   BOUCLE IDLE
=========================== */

function loop() {
  if (!running) return;

  const now = performance.now();
  const elapsed = (now - startTime) / 1000;

  const north = 1 + y;
  const south = 1 - y;
  const east  = 1 + x;
  const west  = 1 - x;

  const totalRate = north + south + east + west;

  totalRunes += totalRate / 60;

  document.getElementById("timer").textContent = elapsed.toFixed(1);
  document.getElementById("totalRunes").textContent = Math.floor(totalRunes);

  updateRates(north, south, east, west);

  if (totalRunes >= goal) {
    running = false;
    document.getElementById("finalTime").textContent = elapsed.toFixed(2);
    document.getElementById("endBox").style.display = "block";
    return;
  }

  requestAnimationFrame(loop);
}

/* ===========================
   AFFICHAGE
=========================== */

function updateRates(n, s, e, w) {
  document.getElementById("northRate").textContent = n.toFixed(2);
  document.getElementById("southRate").textContent = s.toFixed(2);
  document.getElementById("eastRate").textContent  = e.toFixed(2);
  document.getElementById("westRate").textContent  = w.toFixed(2);
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  ctx.beginPath();
  ctx.arc(center.x, center.y, radius - 5, 0, Math.PI * 2);
  ctx.stroke();

  const cursorX = center.x + x * (radius - 5);
  const cursorY = center.y - y * (radius - 5);

  ctx.beginPath();
  ctx.arc(cursorX, cursorY, 6, 0, Math.PI * 2);
  ctx.fill();
}

/* ===========================
   INPUT SOURIS
=========================== */

canvas.addEventListener("mousemove", (e) => {
  if (!running) return;

  const rect = canvas.getBoundingClientRect();
  let mx = e.clientX - rect.left - center.x;
  let my = e.clientY - rect.top - center.y;

  my = -my;

  let nx = mx / (radius - 5);
  let ny = my / (radius - 5);

  const dist = Math.sqrt(nx * nx + ny * ny);
  if (dist > 1) {
    nx /= dist;
    ny /= dist;
  }

  x = nx;
  y = ny;

  draw();
});

/* ===========================
   BOUTONS
=========================== */

document.getElementById("dailyBtn").onclick = () => {
  const today = new Date().toISOString().split("T")[0];
  const seed = today.split("").reduce((a, c) => a + c.charCodeAt(0), 0);
  startGame(seed);
};

document.getElementById("randomBtn").onclick = () => {
  const seed = Math.floor(Math.random() * 2147483647);
  startGame(seed);
};
</script>
</body>
</html>
