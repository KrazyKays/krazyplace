<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>KrazyPlace — Idle K</title>
<link rel="stylesheet" href="https://unpkg.com/@picocss/pico@latest/css/pico.min.css">

<style>
html, body {
  height: 100%;
  margin: 0;
  display: flex;
  flex-direction: column;
}
main {flex: 1;}
#gameArea {
  font-size: 0.9rem;
  line-height: 1;
}
.hero { padding: 0.5rem; text-align: center; }
.container-narrow {
  max-width: 900px;
  margin: auto;
}
table { width: 100%; text-align: center; }
td, th { padding: 0.5rem; }
progress { width: 100%; }
#startSection { margin: 1rem 0; }
</style>
</head>
<body>

<main class="container container-narrow">
<section class="hero">

<h1>Idle K</h1>

<button id="dailyBtn">Partie du jour</button>
<button id="randomBtn">Seed aléatoire</button>

<div id="gameArea" style="display:none;">

<h3>Objectifs</h3>

<table>
<tr><td>Nord</td><td id="goalNorth"></td><td id="totalNorth">0</td></tr>
<tr><td>Sud</td><td id="goalSouth"></td><td id="totalSouth">0</td></tr>
<tr><td>Est</td><td id="goalEast"></td><td id="totalEast">0</td></tr>
<tr><td>Ouest</td><td id="goalWest"></td><td id="totalWest">0</td></tr>
</table>

<p>Temps : <strong id="timer">0.0</strong>s</p>

<div id="startSection">
<button id="startBtn">▶ Start</button>
</div>

<canvas id="controlCanvas" width="300" height="300"
style="border:1px solid #ccc;border-radius:50%;"></canvas>

<div>
Nord: <span id="northRate"></span> |
Sud: <span id="southRate"></span> |
Est: <span id="eastRate"></span> |
Ouest: <span id="westRate"></span>
</div>

<h3>Missions</h3>
<table>
<tbody id="missionsBody"></tbody>
</table>

</div>
</section>
</main>

<script>
function pseudoRandom(seed){
  let s = seed;
  return () => {
    s = (s * 16807) % 2147483647;
    return (s - 1) / 2147483646;
  };
}

let rng;
let goals = {};
let totals;
let missions = [];
let globalMultiplier = 1;

let running = false;
let startTime = 0;

let x = 0, y = 0;
let pointLocked = true;

const canvas = document.getElementById("controlCanvas");
const ctx = canvas.getContext("2d");
const radius = canvas.width/2;
const center = {x:radius,y:radius};

let lastUpdate = 0;

function startGame(seed){
  rng = pseudoRandom(seed);

  totals = {north:0,south:0,east:0,west:0};
  globalMultiplier = 1;

  const totalGoal = 1200;
  goals = {
    north:300,
    south:300,
    east:300,
    west:300
  };

  document.getElementById("goalNorth").textContent = goals.north;
  document.getElementById("goalSouth").textContent = goals.south;
  document.getElementById("goalEast").textContent = goals.east;
  document.getElementById("goalWest").textContent = goals.west;

  generateMissions();

  document.getElementById("gameArea").style.display = "block";
  document.getElementById("startSection").style.display = "block";

  running = false;
  x = 0; y = 0;

  updateRates(1,1,1,1);
  draw();
}

function launchRun(){
  running = true;
  startTime = performance.now();
  lastUpdate = performance.now();
  document.getElementById("startSection").style.display = "none";
}

document.getElementById("startBtn").onclick = launchRun;

function generateMissions(){
  const body = document.getElementById("missionsBody");
  body.innerHTML = "";

  for(let i=0;i<3;i++){
    const m = {progress:0,completed:false,boosted:false};
    missions.push(m);

    const row = document.createElement("tr");
    row.innerHTML = `
      <td>Mission ${i+1}</td>
      <td>
        <progress id="mission${i}" value="0" max="100"></progress>
      </td>
      <td>
        <button id="boost${i}" disabled>x2</button>
      </td>`;
    body.appendChild(row);

    document.getElementById("boost"+i).onclick=()=>tryBoost(i);
  }
}

function tryBoost(i){
  const m = missions[i];
  if(m.boosted) return;

  if(totals.north>=50){
    totals.north-=50;
    globalMultiplier*=2;

    m.boosted=true;

    const btn=document.getElementById("boost"+i);
    btn.disabled=true;
    btn.textContent="✔";

    updateTotals();
  }
}

function updateMissions(){
  if(!running) return;

  missions.forEach((m,i)=>{
    if(m.completed) return;

    m.progress+=0.2;

    if(m.progress>=100){
      m.completed=true;
      document.getElementById("boost"+i).disabled=false;
    }

    document.getElementById("mission"+i).value=m.progress;
  });
}

function gameLoop(){
  const now=performance.now();
  const delta=(now-lastUpdate)/1000;
  lastUpdate=now;

  if(running){
    let north=1+y;
    let south=1-y;
    let east=1+x;
    let west=1-x;

    totals.north+=north*globalMultiplier*delta;
    totals.south+=south*globalMultiplier*delta;
    totals.east+=east*globalMultiplier*delta;
    totals.west+=west*globalMultiplier*delta;

    updateTotals();
    updateRates(north,south,east,west);
    updateMissions();

    document.getElementById("timer").textContent =
      ((now-startTime)/1000).toFixed(1);
  }

  draw();
}

function updateTotals(){
  document.getElementById("totalNorth").textContent=Math.floor(totals.north);
  document.getElementById("totalSouth").textContent=Math.floor(totals.south);
  document.getElementById("totalEast").textContent=Math.floor(totals.east);
  document.getElementById("totalWest").textContent=Math.floor(totals.west);
}

function updateRates(n,s,e,w){
  document.getElementById("northRate").textContent=(n*globalMultiplier).toFixed(2);
  document.getElementById("southRate").textContent=(s*globalMultiplier).toFixed(2);
  document.getElementById("eastRate").textContent=(e*globalMultiplier).toFixed(2);
  document.getElementById("westRate").textContent=(w*globalMultiplier).toFixed(2);
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  ctx.beginPath();
  ctx.arc(center.x,center.y,radius-5,0,Math.PI*2);
  ctx.stroke();

  const px=center.x + x*(radius-5);
  const py=center.y - y*(radius-5);

  ctx.beginPath();
  ctx.arc(px,py,6,0,Math.PI*2);
  ctx.fillStyle="red";
  ctx.fill();
}

canvas.addEventListener("click",(e)=>{
  const rect=canvas.getBoundingClientRect();
  let mx=e.clientX-rect.left-center.x;
  let my=e.clientY-rect.top-center.y;
  my=-my;

  let nx=mx/(radius-5);
  let ny=my/(radius-5);

  const dist=Math.sqrt(nx*nx+ny*ny);
  if(dist>1){nx/=dist;ny/=dist;}

  x=nx;y=ny;
});

setInterval(gameLoop,50);

document.getElementById("dailyBtn").onclick=()=>startGame(Date.now());
document.getElementById("randomBtn").onclick=()=>startGame(Math.random()*999999);
</script>

</body>
</html>
